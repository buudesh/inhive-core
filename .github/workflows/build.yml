name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Rewrite SSH to HTTPS for submodules
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Verify build
        run: |
          # Exclude cmd/bydll (requires pre-built DLL) and platform/desktop (requires CGO headers)
          go build $(go list ./... | grep -v -E '(cmd/bydll|platform/desktop|profile/test)')

      - name: Run vet
        run: |
          go vet $(go list ./... | grep -v -E '(cmd/bydll|platform/desktop|profile/test)')
